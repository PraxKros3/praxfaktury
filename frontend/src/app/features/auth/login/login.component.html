<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#6366f1"/>
        <path d="M8 22L14 10L20 18L24 14" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>NIF</h1>
      <p>Automatizovaný fakturačný systém</p>
    </div>

    <form (ngSubmit)="submit()" class="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          class="form-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@nif.local"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label">Heslo</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" class="btn btn-primary login-submit" [disabled]="loading()">
        {{ loading() ? 'Prihlasujem...' : 'Prihlásiť sa' }}
      </button>
    </form>
  </div>
</div>
